<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Syllabus Reader</title>
    <meta name="description" content="An app to manage your courses" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Syllabus Reader" />
    <meta property="og:description" content="An app to manage your courses" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="" />

  </head>

  <body>
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches))
          document.documentElement.classList.add('dark');
        else
          document.documentElement.classList.remove('dark');
      })();
    </script>
    <div id="root"></div>
    <!-- Google Identity Services for One Tap / Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
